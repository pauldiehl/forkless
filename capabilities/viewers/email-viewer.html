<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email Viewer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #1a1a1a;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .viewer-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      background: #2d2d2d;
      border-bottom: 1px solid #444;
      flex-shrink: 0;
    }

    .viewer-title {
      font-size: 14px;
      font-weight: 600;
      color: #4a9eff;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .viewer-controls {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .viewer-meta {
      font-size: 12px;
      color: #888;
    }

    .btn {
      padding: 6px 12px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
      transition: all 0.2s;
    }

    .btn-primary { background: #4a9eff; color: white; }
    .btn-primary:hover { background: #3a8eef; }
    .btn-secondary { background: #6c757d; color: white; }
    .btn-secondary:hover { background: #545b62; }

    /* Email metadata bar */
    .email-meta {
      padding: 12px 20px;
      background: #252525;
      border-bottom: 1px solid #333;
      flex-shrink: 0;
    }

    .meta-row {
      display: flex;
      gap: 8px;
      margin-bottom: 4px;
      font-size: 13px;
    }

    .meta-label {
      color: #888;
      min-width: 60px;
      flex-shrink: 0;
    }

    .meta-value {
      color: #e0e0e0;
    }

    .meta-tags {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }

    .tag {
      background: #3a3a5a;
      color: #a0a0ff;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-family: monospace;
    }

    /* Toggle bar */
    .view-toggle {
      display: flex;
      padding: 8px 20px;
      background: #222;
      border-bottom: 1px solid #333;
      gap: 4px;
      flex-shrink: 0;
    }

    .toggle-btn {
      padding: 6px 16px;
      background: none;
      border: 1px solid #444;
      color: #888;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      font-family: inherit;
    }

    .toggle-btn.active {
      background: #4a9eff;
      color: white;
      border-color: #4a9eff;
    }

    /* Email render area */
    .email-render {
      flex: 1;
      overflow: auto;
      background: #ffffff;
    }

    .email-render iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Source view */
    .email-source {
      flex: 1;
      overflow: auto;
      display: none;
      padding: 16px 20px;
      background: #1e1e1e;
    }

    .email-source pre {
      font-family: 'Monaco', 'Menlo', monospace;
      font-size: 12px;
      line-height: 1.5;
      color: #d4d4d4;
      white-space: pre-wrap;
      word-break: break-all;
    }

    /* Empty state */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #666;
      gap: 12px;
    }

    .empty-state svg {
      width: 48px;
      height: 48px;
      color: #444;
    }

    /* Email selector */
    .email-selector {
      padding: 16px 20px;
      background: #252525;
      border-bottom: 1px solid #333;
    }

    .email-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .email-list-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      background: #2d2d2d;
      border: 1px solid #3a3a3a;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .email-list-item:hover {
      border-color: #4a9eff;
      background: #333;
    }

    .email-list-item .name {
      font-size: 13px;
      font-weight: 500;
    }

    .email-list-item .date {
      font-size: 11px;
      color: #888;
    }
  </style>
</head>
<body>
  <div class="viewer-header">
    <div class="viewer-title">Email Viewer</div>
    <div class="viewer-controls">
      <span class="viewer-meta" id="viewer-status">Loading...</span>
      <button class="btn btn-secondary" onclick="loadEmailList()">Browse</button>
    </div>
  </div>

  <div id="email-meta-bar" class="email-meta" style="display:none">
    <div class="meta-row">
      <span class="meta-label">Subject:</span>
      <span class="meta-value" id="meta-subject">—</span>
    </div>
    <div class="meta-row">
      <span class="meta-label">ID:</span>
      <span class="meta-value" id="meta-id">—</span>
    </div>
    <div class="meta-row">
      <span class="meta-label">Tags:</span>
      <span class="meta-value meta-tags" id="meta-tags"></span>
    </div>
  </div>

  <div class="view-toggle" id="view-toggle" style="display:none">
    <button class="toggle-btn active" id="toggle-preview" onclick="showView('preview')">Preview</button>
    <button class="toggle-btn" id="toggle-source" onclick="showView('source')">Source</button>
  </div>

  <div class="email-render" id="email-render" style="display:none">
    <iframe id="email-frame" sandbox="allow-same-origin"></iframe>
  </div>

  <div class="email-source" id="email-source">
    <pre id="source-code"></pre>
  </div>

  <div class="empty-state" id="empty-state">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
      <polyline points="22,6 12,13 2,6"/>
    </svg>
    <div>No email loaded</div>
    <div style="font-size:12px">Waiting for an email artifact...</div>
  </div>

  <script>
    let currentView = 'preview';

    // ========================================
    // LOAD EMAIL BY ID
    // ========================================
    async function loadEmail(id) {
      try {
        const res = await fetch(`/api/artifacts/${id}`);
        if (!res.ok) throw new Error('Artifact not found');
        const artifact = await res.json();

        document.getElementById('empty-state').style.display = 'none';
        document.getElementById('email-meta-bar').style.display = 'block';
        document.getElementById('view-toggle').style.display = 'flex';
        document.getElementById('email-render').style.display = 'block';

        // Metadata
        document.getElementById('meta-subject').textContent = artifact.metadata?.subject || '(no subject)';
        document.getElementById('meta-id').textContent = artifact.id;
        document.getElementById('viewer-status').textContent = artifact.id;

        // Tags
        const tagsEl = document.getElementById('meta-tags');
        const tags = artifact.metadata?.templateVars || [];
        tagsEl.innerHTML = tags.map(t => `<span class="tag">${t}</span>`).join('');

        // Render preview
        const frame = document.getElementById('email-frame');
        frame.srcdoc = artifact.content;

        // Source
        document.getElementById('source-code').textContent = artifact.content;

        showView('preview');
      } catch (e) {
        document.getElementById('viewer-status').textContent = `Error: ${e.message}`;
      }
    }

    // ========================================
    // BROWSE ALL EMAILS
    // ========================================
    async function loadEmailList() {
      try {
        const res = await fetch('/api/artifacts?type=email-template');
        const artifacts = await res.json();

        if (artifacts.length === 0) {
          document.getElementById('viewer-status').textContent = 'No email templates found';
          return;
        }

        document.getElementById('empty-state').style.display = 'none';
        document.getElementById('email-render').style.display = 'none';
        document.getElementById('email-source').style.display = 'none';
        document.getElementById('email-meta-bar').style.display = 'none';
        document.getElementById('view-toggle').style.display = 'none';

        // Show selector
        let selector = document.getElementById('email-selector');
        if (!selector) {
          selector = document.createElement('div');
          selector.id = 'email-selector';
          selector.className = 'email-selector';
          document.body.appendChild(selector);
        }

        selector.style.display = 'block';
        selector.innerHTML = `
          <div class="email-list">
            ${artifacts.map(a => `
              <div class="email-list-item" onclick="loadEmail('${a.id}')">
                <div>
                  <div class="name">${a.metadata?.subject || a.id}</div>
                  <div class="date">${a.id} · ${new Date(a.created).toLocaleDateString()}</div>
                </div>
              </div>
            `).join('')}
          </div>
        `;
      } catch (e) {
        document.getElementById('viewer-status').textContent = `Error: ${e.message}`;
      }
    }

    // ========================================
    // VIEW TOGGLE
    // ========================================
    function showView(view) {
      currentView = view;
      const render = document.getElementById('email-render');
      const source = document.getElementById('email-source');

      document.getElementById('toggle-preview').className = `toggle-btn ${view === 'preview' ? 'active' : ''}`;
      document.getElementById('toggle-source').className = `toggle-btn ${view === 'source' ? 'active' : ''}`;

      render.style.display = view === 'preview' ? 'block' : 'none';
      source.style.display = view === 'source' ? 'block' : 'none';

      // Hide selector if showing content
      const selector = document.getElementById('email-selector');
      if (selector) selector.style.display = 'none';
    }

    // ========================================
    // INIT — check URL params or postMessage
    // ========================================
    (function init() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      if (id) {
        loadEmail(id);
      } else {
        document.getElementById('viewer-status').textContent = 'No email selected';
      }
    })();

    window.addEventListener('message', (e) => {
      if (e.data?.type === 'load-artifact') {
        loadEmail(e.data.id);
      }
    });
  </script>
</body>
</html>
