<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markdown Viewer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #1a1a1a;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .viewer-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      background: #2d2d2d;
      border-bottom: 1px solid #444;
      flex-shrink: 0;
    }

    .viewer-title {
      font-size: 14px;
      font-weight: 600;
      color: #4a9eff;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .viewer-meta {
      font-size: 12px;
      color: #888;
    }

    .viewer-controls {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .btn {
      padding: 6px 12px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s;
    }

    .btn-secondary { background: #6c757d; color: white; }
    .btn-secondary:hover { background: #545b62; }

    .view-toggle {
      display: flex;
      padding: 8px 20px;
      background: #222;
      border-bottom: 1px solid #333;
      gap: 4px;
      flex-shrink: 0;
    }

    .toggle-btn {
      padding: 6px 16px;
      background: none;
      border: 1px solid #444;
      color: #888;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      font-family: inherit;
    }

    .toggle-btn.active {
      background: #4a9eff;
      color: white;
      border-color: #4a9eff;
    }

    /* Rendered markdown */
    .md-rendered {
      flex: 1;
      overflow-y: auto;
      padding: 32px 40px;
      max-width: 900px;
      margin: 0 auto;
      width: 100%;
      line-height: 1.7;
    }

    .md-rendered h1 { font-size: 28px; font-weight: 700; margin: 24px 0 12px; color: #fff; border-bottom: 1px solid #333; padding-bottom: 8px; }
    .md-rendered h2 { font-size: 22px; font-weight: 600; margin: 20px 0 10px; color: #f0f0f0; }
    .md-rendered h3 { font-size: 18px; font-weight: 600; margin: 16px 0 8px; color: #e0e0e0; }
    .md-rendered p { margin: 8px 0; }
    .md-rendered ul, .md-rendered ol { padding-left: 24px; margin: 8px 0; }
    .md-rendered li { margin: 4px 0; }
    .md-rendered code { background: #2d2d2d; padding: 2px 6px; border-radius: 4px; font-family: 'Monaco', 'Menlo', monospace; font-size: 13px; color: #e06c75; }
    .md-rendered pre { background: #1e1e1e; border: 1px solid #333; border-radius: 6px; padding: 16px; margin: 12px 0; overflow-x: auto; }
    .md-rendered pre code { background: none; padding: 0; color: #d4d4d4; }
    .md-rendered table { border-collapse: collapse; width: 100%; margin: 12px 0; }
    .md-rendered th, .md-rendered td { border: 1px solid #444; padding: 8px 12px; text-align: left; }
    .md-rendered th { background: #2d2d2d; font-weight: 600; }
    .md-rendered tr:nth-child(even) { background: #252525; }
    .md-rendered blockquote { border-left: 3px solid #4a9eff; padding: 8px 16px; margin: 12px 0; color: #a0a0a0; background: #252525; border-radius: 0 4px 4px 0; }
    .md-rendered a { color: #4a9eff; text-decoration: none; }
    .md-rendered a:hover { text-decoration: underline; }
    .md-rendered hr { border: none; border-top: 1px solid #333; margin: 20px 0; }
    .md-rendered strong { color: #fff; }

    /* Source view */
    .md-source {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: none;
    }

    .md-source pre {
      font-family: 'Monaco', 'Menlo', monospace;
      font-size: 13px;
      line-height: 1.5;
      color: #d4d4d4;
      white-space: pre-wrap;
    }

    /* Empty state */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #666;
      gap: 12px;
    }
  </style>
</head>
<body>
  <div class="viewer-header">
    <div class="viewer-title" id="doc-title">Markdown Viewer</div>
    <div class="viewer-controls">
      <span class="viewer-meta" id="viewer-status">Loading...</span>
      <button class="btn btn-secondary" onclick="copyLink()">Copy Link</button>
    </div>
  </div>

  <div class="view-toggle" id="view-toggle" style="display:none">
    <button class="toggle-btn active" id="toggle-rendered" onclick="showView('rendered')">Rendered</button>
    <button class="toggle-btn" id="toggle-source" onclick="showView('source')">Source</button>
  </div>

  <div class="md-rendered" id="md-rendered" style="display:none"></div>

  <div class="md-source" id="md-source">
    <pre id="source-code"></pre>
  </div>

  <div class="empty-state" id="empty-state">
    <div>No document loaded</div>
  </div>

  <script>
    let currentArtifactId = null;

    async function loadMarkdown(id) {
      currentArtifactId = id;
      try {
        const res = await fetch(`/api/artifacts/${id}`);
        if (!res.ok) throw new Error('Not found');
        const artifact = await res.json();

        document.getElementById('empty-state').style.display = 'none';
        document.getElementById('view-toggle').style.display = 'flex';
        document.getElementById('md-rendered').style.display = 'block';

        const title = artifact.metadata?.title || artifact.id;
        document.getElementById('doc-title').textContent = title;
        document.getElementById('viewer-status').textContent = artifact.id;

        // Render markdown to HTML (lightweight parser)
        document.getElementById('md-rendered').innerHTML = renderMarkdown(artifact.content);
        document.getElementById('source-code').textContent = artifact.content;

        showView('rendered');
      } catch (e) {
        document.getElementById('viewer-status').textContent = `Error: ${e.message}`;
      }
    }

    function showView(view) {
      document.getElementById('toggle-rendered').className = `toggle-btn ${view === 'rendered' ? 'active' : ''}`;
      document.getElementById('toggle-source').className = `toggle-btn ${view === 'source' ? 'active' : ''}`;
      document.getElementById('md-rendered').style.display = view === 'rendered' ? 'block' : 'none';
      document.getElementById('md-source').style.display = view === 'source' ? 'block' : 'none';
    }

    function copyLink() {
      if (!currentArtifactId) return;
      const base = window.location.origin;
      const link = `${base}/?viewer=markdown&artifact=${currentArtifactId}`;
      navigator.clipboard.writeText(link);
      document.getElementById('viewer-status').textContent = 'Link copied!';
      setTimeout(() => {
        document.getElementById('viewer-status').textContent = currentArtifactId;
      }, 1500);
    }

    // ========================================
    // LIGHTWEIGHT MARKDOWN RENDERER
    // ========================================
    function renderMarkdown(md) {
      let html = md;

      // Code blocks (``` ... ```)
      html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) =>
        `<pre><code>${escHtml(code.trim())}</code></pre>`
      );

      // Inline code
      html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

      // Headers
      html = html.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
      html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
      html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
      html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');

      // Bold & italic
      html = html.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
      html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');

      // Blockquotes
      html = html.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');

      // Horizontal rules
      html = html.replace(/^---$/gm, '<hr>');

      // Links
      html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');

      // Tables
      html = html.replace(/^(\|.+\|)\n(\|[-| :]+\|)\n((?:\|.+\|\n?)+)/gm, (_, header, sep, body) => {
        const headers = header.split('|').filter(Boolean).map(h => `<th>${h.trim()}</th>`).join('');
        const rows = body.trim().split('\n').map(row => {
          const cells = row.split('|').filter(Boolean).map(c => `<td>${c.trim()}</td>`).join('');
          return `<tr>${cells}</tr>`;
        }).join('');
        return `<table><thead><tr>${headers}</tr></thead><tbody>${rows}</tbody></table>`;
      });

      // Unordered lists
      html = html.replace(/^(\s*)[-*] (.+)$/gm, '$1<li>$2</li>');
      html = html.replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>');

      // Ordered lists
      html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');

      // Paragraphs (lines not already wrapped)
      html = html.split('\n\n').map(block => {
        block = block.trim();
        if (!block) return '';
        if (/^<[a-z]/.test(block)) return block;
        return `<p>${block}</p>`;
      }).join('\n');

      return html;
    }

    function escHtml(s) {
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    // Init
    (function() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      if (id) loadMarkdown(id);
      else document.getElementById('viewer-status').textContent = 'No document selected';
    })();

    window.addEventListener('message', (e) => {
      if (e.data?.type === 'load-artifact') loadMarkdown(e.data.id);
    });
  </script>
</body>
</html>
