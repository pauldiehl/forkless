<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Forkless</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #101014;
      --bg-secondary: #18181b;
      --bg-tertiary: #27272a;
      --surface: #2a2a2e;
      --surface-hover: #3a3a3f;
      --border: #3f3f46;
      --text-primary: #fafafa;
      --text-secondary: #a1a1aa;
      --text-muted: #71717a;
      --accent: #6366f1;
      --accent-dim: rgba(99, 102, 241, 0.15);
      --accent-glow: rgba(99, 102, 241, 0.3);
      --agent-bg: #131316;
      --user-msg: #2e2b5e;
      --agent-msg: #27272a;
      --success: #34d399;
      --gradient-from: #6366f1;
      --gradient-to: #8b5cf6;
      --radius: 12px;
      --radius-sm: 8px;
    }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
    }

    /* === TRANSACTION LAYER === */
    #transaction-layer {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 1;
      transition: bottom 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    #transaction-layer iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    body.mode-minimal #transaction-layer {
      bottom: 55vh;
    }

    body.mode-full #transaction-layer {
      bottom: 100%;
    }

    /* === AGENT LAYER === */
    #agent-layer {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    body.mode-collapsed #agent-layer {
      transform: translateY(100%);
      pointer-events: none;
    }

    body.mode-minimal #agent-layer {
      height: 55vh;
    }

    body.mode-full #agent-layer {
      height: 100vh;
    }

    /* === FLOATING ACTION BUTTON === */
    #agent-fab {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 20;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, var(--gradient-from), var(--gradient-to));
      color: white;
      font-size: 24px;
      cursor: pointer;
      box-shadow: 0 4px 24px var(--accent-glow);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      animation: fab-pulse 3s ease-in-out infinite;
    }

    #agent-fab:hover {
      transform: scale(1.1);
      box-shadow: 0 6px 32px var(--accent-glow);
    }

    #agent-fab:active {
      transform: scale(0.95);
    }

    body:not(.mode-collapsed) #agent-fab {
      transform: scale(0) translateY(20px);
      opacity: 0;
      pointer-events: none;
    }

    @keyframes fab-pulse {
      0%, 100% { box-shadow: 0 4px 24px var(--accent-glow); }
      50% { box-shadow: 0 4px 32px var(--accent-glow); }
    }

    /* === AGENT HEADER === */
    .agent-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .agent-header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .agent-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--gradient-from), var(--gradient-to));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .agent-name {
      font-weight: 600;
      font-size: 15px;
      color: var(--text-primary);
    }

    .agent-status {
      font-size: 12px;
      color: var(--success);
    }

    .agent-header-controls {
      display: flex;
      gap: 4px;
    }

    .mode-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-secondary);
      width: 32px;
      height: 32px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      transition: all 0.2s ease;
    }

    .mode-btn:hover {
      background: var(--surface-hover);
      color: var(--accent);
      border-color: var(--accent);
    }

    .mode-btn.active {
      background: var(--accent-dim);
      color: var(--accent);
      border-color: var(--accent);
    }

    /* === CONVERSATION LOG === */
    .conversation-log {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: var(--agent-bg);
      scroll-behavior: smooth;
    }

    .conversation-log::-webkit-scrollbar {
      width: 6px;
    }

    .conversation-log::-webkit-scrollbar-track {
      background: transparent;
    }

    .conversation-log::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    .message {
      display: flex;
      gap: 10px;
      max-width: 85%;
      animation: msg-in 0.3s ease;
    }

    @keyframes msg-in {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.agent {
      align-self: flex-start;
    }

    .message.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .message-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
    }

    .message.agent .message-avatar {
      background: linear-gradient(135deg, var(--gradient-from), var(--gradient-to));
    }

    .message.user .message-avatar {
      background: var(--surface);
      color: var(--text-secondary);
    }

    .message-bubble {
      padding: 10px 14px;
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.5;
      word-wrap: break-word;
    }

    .message.agent .message-bubble {
      background: var(--agent-msg);
      border-bottom-left-radius: 4px;
    }

    .message.user .message-bubble {
      background: var(--user-msg);
      border-bottom-right-radius: 4px;
    }

    .typing-indicator {
      display: flex;
      gap: 4px;
      padding: 12px 16px;
      align-self: flex-start;
    }

    .typing-indicator span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: typing-bounce 1.4s ease-in-out infinite;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typing-bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    /* === INPUT AREA === */
    .input-area {
      padding: 12px 16px;
      background: var(--bg-secondary);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      transition: flex 0.3s ease;
    }

    .input-area.expanded {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    /* Hide conversation log when input is expanded */
    .conversation-log.hidden-for-expand {
      flex: 0 !important;
      min-height: 0 !important;
      max-height: 0 !important;
      padding: 0 !important;
      overflow: hidden !important;
    }

    .input-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    .input-area.expanded .input-row {
      flex: 1;
      align-items: stretch;
      min-height: 0;
    }

    /* Right-side button column: expand pinned top, send pinned bottom */
    .btn-column {
      display: flex;
      flex-direction: column;
      align-self: stretch;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .expand-btn {
      width: 42px;
      height: 32px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-secondary);
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s ease;
    }

    .expand-btn.visible {
      display: flex;
    }

    .expand-btn:hover {
      background: var(--surface-hover);
      color: var(--accent);
      border-color: var(--accent);
    }

    .input-field {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
      color: var(--text-primary);
      font-size: 14px;
      font-family: inherit;
      resize: none;
      outline: none;
      min-height: 42px;
      max-height: 147px; /* ~6 lines: 6 * (14px * 1.5) + 20px padding */
      line-height: 1.5;
      transition: border-color 0.2s ease, max-height 0.3s ease;
    }

    .input-area.expanded .input-field {
      max-height: none !important;
      height: 100% !important;
      min-height: 0 !important;
    }

    .input-field:focus {
      border-color: var(--accent);
    }

    .input-field::placeholder {
      color: var(--text-muted);
    }

    .send-btn {
      width: 42px;
      height: 42px;
      border-radius: var(--radius);
      border: none;
      background: linear-gradient(135deg, var(--gradient-from), var(--gradient-to));
      color: white;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      flex-shrink: 0;
    }

    .send-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 2px 12px var(--accent-glow);
    }

    .send-btn:active {
      transform: scale(0.95);
    }

    .send-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }

    /* === WELCOME STATE === */
    .welcome-message {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-secondary);
    }

    .welcome-message h2 {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .welcome-message p {
      font-size: 14px;
      line-height: 1.5;
    }

    /* === RESPONSIVE === */
    @media (max-width: 640px) {
      body.mode-minimal #agent-layer {
        height: 60vh;
      }

      body.mode-minimal #transaction-layer {
        bottom: 60vh;
      }

      .message {
        max-width: 92%;
      }

      #agent-fab {
        bottom: 16px;
        right: 16px;
        width: 54px;
        height: 54px;
        font-size: 22px;
      }
    }
  </style>
</head>
<body class="mode-minimal">

  <!-- TRANSACTION LAYER -->
  <div id="transaction-layer">
    <iframe id="tl-iframe" src="/transaction-layer/index.html" title="Transaction Layer"></iframe>
  </div>

  <!-- FLOATING ACTION BUTTON -->
  <button id="agent-fab" aria-label="Open agent" onclick="setMode('minimal')">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
    </svg>
  </button>

  <!-- AGENT LAYER -->
  <div id="agent-layer">
    <div class="agent-header">
      <div class="agent-header-left">
        <div class="agent-avatar">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
        </div>
        <div>
          <div class="agent-name" id="agent-name">Agent</div>
          <div class="agent-status" id="agent-status">Online</div>
        </div>
      </div>
      <div class="agent-header-controls">
        <button class="mode-btn" id="btn-collapse" onclick="setMode('collapsed')" title="Collapse">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </button>
        <button class="mode-btn" id="btn-minimal" onclick="setMode('minimal')" title="Minimal">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="12" width="18" height="9" rx="2"/>
            <line x1="3" y1="6" x2="21" y2="6"/>
          </svg>
        </button>
        <button class="mode-btn" id="btn-full" onclick="setMode('full')" title="Full screen">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Conversation Log -->
    <div class="conversation-log" id="conversation-log">
      <div class="welcome-message" id="welcome-message">
        <h2>Welcome</h2>
        <p>Start a conversation to get going.</p>
      </div>
    </div>

    <!-- Input Area -->
    <div class="input-area" id="input-area">
      <div class="input-row">
        <textarea
          class="input-field"
          id="user-input"
          placeholder="Type or speak..."
          rows="1"
          autofocus
        ></textarea>
        <div class="btn-column">
          <button class="expand-btn" id="expand-btn" onclick="toggleExpandInput()" aria-label="Expand input" title="Expand input">
            <svg id="expand-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="18 15 12 9 6 15"/>
            </svg>
          </button>
          <button class="send-btn" id="send-btn" onclick="sendMessage()" aria-label="Send">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"/>
              <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ========================================
    // STATE
    // ========================================
    let currentMode = 'minimal';
    let inputExpanded = false;
    let themeConfig = null;
    const messages = [];
    let responseIndex = 0;

    // Default canned responses (overridden by theme)
    let cannedResponses = [
      "Good question. Let me think about the best approach for that.",
      "I can definitely help with that. Tell me more.",
      "Let's break it down step by step.",
      "Got it. Let me work on that."
    ];

    // ========================================
    // THEME SYSTEM
    // ========================================
    function getThemeName() {
      const params = new URLSearchParams(window.location.search);
      return params.get('theme') || 'default';
    }

    async function loadTheme() {
      const name = getThemeName();
      try {
        const res = await fetch(`/themes/${name}.json`);
        if (!res.ok) throw new Error(`Theme '${name}' not found`);
        themeConfig = await res.json();
      } catch (e) {
        console.warn(`Failed to load theme '${name}', falling back to default`, e);
        const res = await fetch('/themes/default.json');
        themeConfig = await res.json();
      }
      applyTheme(themeConfig);
    }

    function applyTheme(config) {
      const root = document.documentElement;
      const c = config.colors;

      // Apply CSS custom properties
      root.style.setProperty('--bg-primary', c.bgPrimary);
      root.style.setProperty('--bg-secondary', c.bgSecondary);
      root.style.setProperty('--bg-tertiary', c.bgTertiary);
      root.style.setProperty('--surface', c.surface);
      root.style.setProperty('--surface-hover', c.surfaceHover);
      root.style.setProperty('--border', c.border);
      root.style.setProperty('--text-primary', c.textPrimary);
      root.style.setProperty('--text-secondary', c.textSecondary);
      root.style.setProperty('--text-muted', c.textMuted);
      root.style.setProperty('--accent', c.accent);
      root.style.setProperty('--accent-dim', c.accentDim);
      root.style.setProperty('--accent-glow', c.accentGlow);
      root.style.setProperty('--agent-bg', c.agentBg);
      root.style.setProperty('--user-msg', c.userMsg);
      root.style.setProperty('--agent-msg', c.agentMsg);
      root.style.setProperty('--success', c.success);
      root.style.setProperty('--gradient-from', c.gradientFrom);
      root.style.setProperty('--gradient-to', c.gradientTo);

      // Apply brand content
      document.title = config.brand.name;
      document.getElementById('agent-name').textContent = config.brand.agentName;
      document.getElementById('agent-status').textContent = config.brand.agentStatus;

      // Welcome message
      const welcomeEl = document.getElementById('welcome-message');
      if (welcomeEl) {
        welcomeEl.querySelector('h2').textContent = config.welcome.title;
        welcomeEl.querySelector('p').textContent = config.welcome.description;
      }

      // Canned responses
      if (config.agent.cannedResponses) {
        cannedResponses = config.agent.cannedResponses;
      }

      // Pass theme to transaction layer iframe
      const iframe = document.getElementById('tl-iframe');
      const themeName = getThemeName();
      iframe.src = `/transaction-layer/index.html?theme=${themeName}`;
    }

    // ========================================
    // MODE SWITCHING
    // ========================================
    function setMode(mode) {
      currentMode = mode;
      document.body.className = `mode-${mode}`;

      document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
      const activeBtn = document.getElementById(`btn-${mode}`);
      if (activeBtn) activeBtn.classList.add('active');

      localStorage.setItem('forkless-agent-mode', mode);

      // Reset input expansion when collapsing
      if (mode === 'collapsed') {
        collapseInput();
      }

      if (mode !== 'collapsed') {
        setTimeout(() => document.getElementById('user-input').focus(), 400);
      }
    }

    // ========================================
    // TEXTAREA EXPAND/COLLAPSE
    // ========================================
    function checkExpandButton() {
      const input = document.getElementById('user-input');
      const expandBtn = document.getElementById('expand-btn');
      if (inputExpanded) return; // Don't touch visibility while expanded
      // Show only when textarea has hit the 6-line max-height cap (147px)
      const atMaxHeight = input.scrollHeight > 147;
      if (atMaxHeight) {
        expandBtn.classList.add('visible');
      } else {
        expandBtn.classList.remove('visible');
      }
    }

    function toggleExpandInput() {
      if (inputExpanded) {
        collapseInput();
      } else {
        expandInput();
      }
    }

    function expandInput() {
      inputExpanded = true;
      const input = document.getElementById('user-input');
      // Clear inline height so CSS height:100%!important takes over
      input.style.removeProperty('height');
      document.getElementById('input-area').classList.add('expanded');
      document.getElementById('conversation-log').classList.add('hidden-for-expand');
      document.getElementById('expand-icon').innerHTML = '<polyline points="6 9 12 15 18 9"/>';
      input.focus();
    }

    function collapseInput() {
      inputExpanded = false;
      const input = document.getElementById('user-input');
      document.getElementById('input-area').classList.remove('expanded');
      document.getElementById('conversation-log').classList.remove('hidden-for-expand');
      document.getElementById('expand-icon').innerHTML = '<polyline points="18 15 12 9 6 15"/>';
      // Restore auto-sized height
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 147) + 'px';
      setTimeout(checkExpandButton, 50);
    }

    function resetInput() {
      const input = document.getElementById('user-input');
      const expandBtn = document.getElementById('expand-btn');

      input.value = '';
      input.style.height = 'auto';
      inputExpanded = false;
      document.getElementById('input-area').classList.remove('expanded');
      document.getElementById('expand-icon').innerHTML = '<polyline points="18 15 12 9 6 15"/>';
      expandBtn.classList.remove('visible');
    }

    // ========================================
    // MESSAGING
    // ========================================
    function addMessage(role, text) {
      messages.push({ role, text, timestamp: Date.now() });

      const log = document.getElementById('conversation-log');

      const welcome = log.querySelector('.welcome-message');
      if (welcome) welcome.remove();

      const msgDiv = document.createElement('div');
      msgDiv.className = `message ${role}`;

      const avatar = document.createElement('div');
      avatar.className = 'message-avatar';
      if (role === 'agent') {
        avatar.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>';
      } else {
        avatar.textContent = 'Y';
      }

      const bubble = document.createElement('div');
      bubble.className = 'message-bubble';
      bubble.textContent = text;

      msgDiv.appendChild(avatar);
      msgDiv.appendChild(bubble);
      log.appendChild(msgDiv);

      log.scrollTop = log.scrollHeight;
    }

    function showTyping() {
      const log = document.getElementById('conversation-log');
      const indicator = document.createElement('div');
      indicator.className = 'typing-indicator';
      indicator.id = 'typing';
      indicator.innerHTML = '<span></span><span></span><span></span>';
      log.appendChild(indicator);
      log.scrollTop = log.scrollHeight;
    }

    function hideTyping() {
      const el = document.getElementById('typing');
      if (el) el.remove();
    }

    function sendMessage() {
      const input = document.getElementById('user-input');
      const text = input.value.trim();
      if (!text) return;

      addMessage('user', text);

      // Reset input to default state
      resetInput();

      showTyping();

      const delay = 800 + Math.random() * 1200;
      setTimeout(() => {
        hideTyping();
        const response = cannedResponses[responseIndex % cannedResponses.length];
        responseIndex++;
        addMessage('agent', response);
      }, delay);
    }

    // ========================================
    // INPUT HANDLING
    // ========================================
    const inputField = document.getElementById('user-input');

    inputField.addEventListener('input', () => {
      if (!inputExpanded) {
        inputField.style.height = 'auto';
        inputField.style.height = Math.min(inputField.scrollHeight, 147) + 'px';
      }
      checkExpandButton();
    });

    inputField.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // ========================================
    // INIT
    // ========================================
    (async function init() {
      // Load theme first
      await loadTheme();

      // Restore saved mode
      const savedMode = localStorage.getItem('forkless-agent-mode');
      if (savedMode && ['collapsed', 'minimal', 'full'].includes(savedMode)) {
        setMode(savedMode);
      } else {
        setMode('minimal');
      }

      // Agent greeting from theme
      setTimeout(() => {
        if (themeConfig && themeConfig.agent.greeting) {
          addMessage('agent', themeConfig.agent.greeting);
        }
      }, 600);
    })();
  </script>
</body>
</html>
